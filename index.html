<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Manutenção</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="scss/index.css">
</head>
<body>
    <main>
        <header class="header">
            <i class=" header__icon fa-solid fa-screwdriver-wrench"></i>
            <h1 class="header__title">Controle Completo de Manutenção</h1>
        </header>

        <aside class="control">
            <div class="control__title">
                <i class=" control__icon fa-solid fa-gauge-high"></i>
                <p class="control__title-title">ODÔMETRO ATUAL</p>
            </div>

        <div class="control__status">
            <div class="control__status-input">
                <input class="control__status-field" type="number" id="km-atual" placeholder="EX: 15.000">
                <label class="control__status-label" for="km-atual">KM</label>
            </div>

            <div class="control__status-feedback">
                <p class="control__status-title">Status Geral</p>
               
                <div class="control__status-info">
                    <i class="fa-regular fa-circle-check"></i>
                    <p>Tudo em Ordem</p>
                </div>
            </div>
        </div>

        
        </aside>
        
        <div class="filter">
            <button class="filter__button moreFrequency active">Mais frequente </button>
            <button class="filter__button noFrequency">Menos frequente </button>
            <button class="add"><i class="fa-solid fa-plus"></i></button>
        </div>
    
        <article class="itemReviw">
            <div class="itemReviw__card important">
                <header class="itemReviw__header">
                    <i class="itemReviw__icon fa-solid fa-droplet"></i>
                    <div class="itemReviw__titleGroup">
                        <h2 class="itemReviw__name">Óleo do Motor</h2>
                        <p class="itemReviw__interval">A cada 3.000 KM</p>
                    </div>
                </header>
            
                <div class="itemReviw__status">
                    <div class="itemReviw__textGroup">
                        <p class="itemReviw__mudeStatus">Em bom estado</p>
                        <p class="itemReviw__remaining">Faltam 1.800 KM</p>
                    </div>

                    <!--! vai ser trocado por um JS -->
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                </div>

                <footer class="itemReviw__footer">
                    
                    <p class="itemReviw__lastChange">Última troca: 7.000 KM</p>
        
                    <button class="itemReviw__button">Atualizar <i class="fa-solid fa-chevron-right" aria-hidden="true"></i></button>

                </footer>
            </div>
            <!--! teste de filtro  -->
            <div class="itemReviw__card">
                <header class="itemReviw__header">
                    <i class="itemReviw__icon fa-solid fa-droplet"></i>
                    <div class="itemReviw__titleGroup">
                        <h2 class="itemReviw__name">Óleo do Motor</h2>
                        <p class="itemReviw__interval">A cada 3.000 KM</p>
                    </div>
                </header>
            
                <div class="itemReviw__status">
                    <div class="itemReviw__textGroup">
                        <p class="itemReviw__mudeStatus">Em bom estado</p>
                        <p class="itemReviw__remaining">Faltam 1.800 KM</p>
                    </div>

                    <!--! vai ser trocado por um JS -->
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                </div>

                <footer class="itemReviw__footer">
                    
                    <p class="itemReviw__lastChange">Última troca: 7.000 KM</p>
        
                    <button class="itemReviw__button">Atualizar <i class="fa-solid fa-chevron-right" aria-hidden="true"></i></button>

                </footer>
            </div>
        </article>

        <aside class="inputItem hidden">
            <div class="inputItem__container">
                <div class="inputItem__card">
                    <header class="inputItem__header">
                        <i class="itemReviw__icon fa-solid fa-screwdriver-wrench"></i>
                        <div class="inputItem__titleGroup">
                            <span class="createCancel"><button id="teste" step="5">X</button></span>
                            <input maxlength="35" autofocus step="1" type="text" name="titulo" id="titulo" placeholder="EX: Óleo do Motor">
                            <input maxlength="35" step="2" type="text" name="cada" id="cada" placeholder="EX: A cada 1.000 KM">
                        </div>
                    </header>
                    
                    <div class="checkFrequency">
                        <input step="3" type="checkbox" name="frequencyFilter" id="frequencyFilter"> Marcar como frequente?
                    </div>

                    <footer class="inputItem__footer">
                        
                        <p class="itemReviw__lastChange"><input maxlength="35" step="4" type="text" name="ultima" id="ultima" placeholder="EX: Última troca: 7.000 KM"></p>
                        
                        <button class="createItem">Criar <i class="fa-solid fa-chevron-right" aria-hidden="true"></i></button>
                    </footer>
                </div>
        
            </div>
        </aside>


    </main>
    
    <script type="module" src="src/js/index.js"></script>
    
</body>
</html>
